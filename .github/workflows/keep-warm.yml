name: keep-warm

# 무료 호스팅(Render) 콜드스타트 방지.
# Render 무료 서비스는 15분 무요청 시 sleep → 첫 요청이 30~60초 걸린다.
# 10분마다 /health 를 호출해 서버를 깨워 두어 상시 warm 상태로 유지한다.
# (저장소가 public 이라 GitHub Actions 실행시간 무료·무제한.)
#
# 주의: GitHub 예약 워크플로는 저장소에 60일간 아무 활동이 없으면 자동 비활성화된다.
#       활발히 개발 중이면 문제없다. 필요 시 Actions 탭에서 수동 실행/재활성화 가능.

on:
  schedule:
    - cron: "*/10 * * * *" # 매 10분 (Render 15분 sleep 전에 깨움)
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging zzippu-api /health ..."
          code=$(curl -sS --max-time 90 -o /dev/null -w "%{http_code}" https://zzippu-api.onrender.com/health)
          echo "HTTP $code"
          # 콜드스타트 웨이크업이 목적이라 실패해도 실패 처리하지 않는다(다음 주기에 재시도).
          if [ "$code" != "200" ]; then
            echo "::warning::health returned $code (아마 콜드스타트 웨이크업 중 — 정상 범위)"
          fi
